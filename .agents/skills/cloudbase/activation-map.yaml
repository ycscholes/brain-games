scenarios:
  # Use stable skill IDs here rather than repo-specific file paths so the contract survives local installs, all-in-one bundles, and compatibility mirrors.
  - id: web-auth
    priority: 100
    signals:
      - CloudBase Web 登录
      - Web 注册
      - auth login page
      - publishable key
      - 短信登录
      - 邮箱登录
    firstRead: auth-tool
    thenRead:
      - auth-web
      - web-development
    beforeAction:
      - 先检查并开启所需登录方式，再写前端代码。
      - 优先通过 `queryAppAuth` / `manageAppAuth` 获取 publishable key 并确认使用 Web SDK。
    doNotUse:
      - cloud-functions
      - http-api
    commonMistakes:
      - 把 Web 登录实现成云函数认证逻辑。
      - 未开启 provider 就直接生成登录 UI。

  - id: miniapp-cloudbase
    priority: 95
    signals:
      - 小程序 云开发
      - wx.cloud
      - mini program cloudbase
      - OPENID
      - 小程序数据库
    firstRead: miniprogram-development
    thenRead:
      - auth-wechat
      - no-sql-wx-mp-sdk
    beforeAction:
      - 先确认项目是否真的使用 CloudBase。
      - 使用 wx.cloud 和 OPENID 路径，不要先套 Web 认证模型。
    doNotUse:
      - auth-web
      - web-development
    commonMistakes:
      - 给小程序生成多余的 Web 登录页。
      - 混用 Web SDK 和小程序 SDK。

  - id: native-http-api
    priority: 100
    signals:
      - Android CloudBase
      - iOS CloudBase
      - Flutter CloudBase
      - React Native CloudBase
      - 原生 App 接入
    firstRead: http-api
    thenRead:
      - auth-tool
      - relational-database-tool
    beforeAction:
      - 先确认当前平台不支持 CloudBase SDK。
      - 确认 HTTP API 鉴权方式、Base URL 和数据库能力边界；应用侧登录配置仍走 `queryAppAuth` / `manageAppAuth`。
    doNotUse:
      - auth-web
      - no-sql-web-sdk
      - web-development
    commonMistakes:
      - 在原生 App 中误用 Web SDK。
      - 未核对 OpenAPI 就猜接口。

  - id: web-nosql
    priority: 90
    signals:
      - Web 文档数据库
      - CloudBase collection
      - 前端查库
      - NoSQL Web SDK
    firstRead: web-development
    thenRead:
      - no-sql-web-sdk
      - auth-web
    beforeAction:
      - 先确认是 Web SDK 场景。
      - 确认登录态与数据库访问权限模型。
    doNotUse:
      - relational-database-tool
      - http-api
    commonMistakes:
      - 把前端查文档库误导到 MySQL 管理工具。
      - 未确认登录态就直接写数据库代码。

  - id: mysql-mcp
    priority: 88
    signals:
      - MySQL 建表
      - executeWriteSQL
      - security rule
      - CloudBase 关系型数据库管理
    firstRead: relational-database-tool
    thenRead:
      - relational-database-web
      - http-api
    beforeAction:
      - 先区分当前是 MCP 运维管理还是应用代码接入。
      - 写操作前先跑 SELECT 或先读安全规则。
    doNotUse:
      - no-sql-web-sdk
      - web-development
    commonMistakes:
      - 在 MCP 管理场景里初始化 SDK。
      - 未验证条件就直接执行写 SQL。

  - id: cloud-functions
    priority: 92
    signals:
      - 创建云函数
      - HTTP 云函数
      - getFunctionLogs
      - scf_bootstrap
      - runtime
    firstRead: cloud-functions
    thenRead:
      - auth-tool
      - ai-model-nodejs
    beforeAction:
      - 先区分 Event Function 与 HTTP Function。
      - 创建前确定 runtime，避免后续不可变限制。
    doNotUse:
      - cloudrun-development
      - auth-web
    commonMistakes:
      - 把 Web 登录逻辑错误地放进云函数。
      - HTTP 函数遗漏 `scf_bootstrap` 或 9000 端口要求。

  - id: cloudrun-backend
    priority: 85
    signals:
      - CloudRun 部署
      - 云托管
      - container backend
      - Dockerfile
    firstRead: cloudrun-development
    thenRead:
      - auth-tool
      - relational-database-tool
    beforeAction:
      - 先确认这是容器服务而不是云函数。
      - 检查 CORS、镜像入口和环境变量策略。
    doNotUse:
      - cloud-functions
    commonMistakes:
      - 把 CloudRun 需求收敛成云函数模板。

  - id: ui-first
    priority: 98
    signals:
      - 设计页面
      - 登录页 UI
      - frontend interface
      - 组件样式
      - prototype
    firstRead: ui-design
    thenRead:
      - web-development
      - miniprogram-development
    beforeAction:
      - 写任何 UI 代码前先输出设计规格。
      - 再根据平台补读 Web 或小程序实现规则。
    doNotUse:
      - cloud-functions
    commonMistakes:
      - 没有设计规格就直接开始写 JSX 或 CSS。
      - 生成 generic UI 而没结合平台约束。

  - id: ai-web
    priority: 80
    signals:
      - Web AI 对话
      - CloudBase AI 流式输出
      - Web 集成模型
    firstRead: web-development
    thenRead:
      - ai-model-web
      - ui-design
    beforeAction:
      - 先确认前端平台和流式输出交互方式。
      - UI 场景先读设计规范再实现聊天界面。
    doNotUse:
      - ai-model-wechat
      - http-api
    commonMistakes:
      - Web 场景读成小程序或原生 App 路径。

  - id: spec-workflow
    priority: 75
    signals:
      - 需求文档
      - 技术方案
      - tasks.md
      - Spec 工作流
    firstRead: spec-workflow
    thenRead:
      - cloudbase
    beforeAction:
      - 先完成 requirements、design、tasks 并获得确认。
      - 再进入代码实现阶段。
    doNotUse:
      - web-development
      - cloud-functions
    commonMistakes:
      - 跳过需求和设计直接开始实现。
