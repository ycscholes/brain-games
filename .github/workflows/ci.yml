name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Lint
        run: npm run lint
        continue-on-error: true # Keep going even if lint fails to show rules compliance

      - name: Rules Compliance
        id: rules-compliance
        run: |
          echo "Scanning changed files for project rules compliance..."
          # In CI, we usually scan changed files. For simplicity, we scan src/
          find src -name "*.ts" -o -name "*.tsx" | while read file; do
            node .trae/rules/project_rules_validator.js "$file" "no-explicit-any" || exit 1
            node .trae/rules/project_rules_validator.js "$file" "async-try-catch" || exit 1
            node .trae/rules/project_rules_validator.js "$file" "no-magic-numbers" || exit 1
          done
        shell: bash

      - name: Run Validator Tests
        run: npx jest .trae/rules/tests/validator.test.js
